---
- name: Ensure OpenCode directory exists
  ansible.builtin.file:
    path: "{{ opencode_install_dir }}"
    state: directory
    owner: "root"
    group: "root"
    mode: "0755"

- name: Create OpenCode data directory
  ansible.builtin.file:
    path: "{{ opencode_install_dir }}/data"
    state: directory
    owner: "root"
    group: "root"
    mode: "0755"

- name: Deploy GitHub Copilot provider config for OpenCode
  ansible.builtin.template:
    src: "config.json.j2"
    dest: "{{ opencode_install_dir }}/data/config.json"
    owner: "root"
    group: "root"
    mode: "0600"
  when: opencode_github_copilot_enabled | default(false)
  notify: Restart OpenCode

- name: Remove GitHub Copilot provider config when disabled
  ansible.builtin.file:
    path: "{{ opencode_install_dir }}/data/config.json"
    state: absent
  when: not (opencode_github_copilot_enabled | default(false))
  notify: Restart OpenCode

- name: Template docker-compose file for OpenCode
  ansible.builtin.template:
    src: "docker-compose.yml.j2"
    dest: "{{ opencode_install_dir }}/docker-compose.yml"
    owner: "root"
    group: "root"
    mode: "0644"
  notify: Restart OpenCode

- name: Start OpenCode docker-compose project
  community.docker.docker_compose_v2:
    project_src: "{{ opencode_install_dir }}"
    state: present
    pull: always
  register: _opencode_compose
