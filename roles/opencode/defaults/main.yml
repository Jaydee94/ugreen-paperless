---
# Default variables for opencode role

opencode_install_dir: "/opt/opencode"
opencode_image: "ghcr.io/anomalyco/opencode"
opencode_version: "latest"

# Web Interface Settings
opencode_port: 8080
opencode_host: "0.0.0.0"

# Optional: Add server password for security
# opencode_server_password: "your_secure_password"

# GitHub Copilot integration
# Set to true to enable GitHub Copilot as the AI provider.
# Requires a GitHub personal access token with Copilot access stored in opencode_github_token
# (recommended: use Ansible Vault to store the token).
# Example: ansible-vault encrypt_string 'ghp_yourtoken' --name 'opencode_github_token'
opencode_github_copilot_enabled: false
# opencode_github_token: "{{ vault_opencode_github_token }}"
