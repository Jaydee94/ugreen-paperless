---
- name: Ensure OpenClaw directory exists
  ansible.builtin.file:
    path: "{{ openclaw_install_dir }}"
    state: directory
    owner: "root"
    group: "root"
    mode: "0755"

- name: Create OpenClaw data directory
  ansible.builtin.file:
    path: "{{ openclaw_install_dir }}/data"
    state: directory
    owner: "root"
    group: "root"
    mode: "0755"

- name: Create OpenClaw workspace directory
  ansible.builtin.file:
    path: "{{ openclaw_workspace_dir }}"
    state: directory
    owner: "root"
    group: "root"
    mode: "0755"

- name: Deploy GitHub Copilot provider config for OpenClaw
  ansible.builtin.template:
    src: "openclaw-config.json.j2"
    dest: "{{ openclaw_install_dir }}/data/openclaw.json"
    owner: "root"
    group: "root"
    mode: "0600"
  when: openclaw_github_copilot_enabled | default(false)
  notify: Restart OpenClaw

- name: Remove GitHub Copilot provider config when disabled
  ansible.builtin.file:
    path: "{{ openclaw_install_dir }}/data/openclaw.json"
    state: absent
  when: not (openclaw_github_copilot_enabled | default(false))
  notify: Restart OpenClaw

- name: Template docker-compose file for OpenClaw
  ansible.builtin.template:
    src: "docker-compose.yml.j2"
    dest: "{{ openclaw_install_dir }}/docker-compose.yml"
    owner: "root"
    group: "root"
    mode: "0644"
  notify: Restart OpenClaw

- name: Start OpenClaw docker-compose project
  community.docker.docker_compose_v2:
    project_src: "{{ openclaw_install_dir }}"
    state: present
    pull: always
  register: _openclaw_compose
