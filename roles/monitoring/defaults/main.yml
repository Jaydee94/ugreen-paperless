---
# Default variables for the monitoring role
# These can be overridden in group_vars/host_vars or playbooks

monitoring_user: monitoring
monitoring_group: monitoring
monitoring_uid: 1200
monitoring_gid: 1200

# Base directory for monitoring stack files and data
monitoring_base_dir: /opt/monitoring

# Prometheus settings
prometheus_image: prom/prometheus:v3.2.1
prometheus_port: 9090
prometheus_retention_time: 15d

# Grafana Alloy settings (metrics collector and service health prober)
alloy_image: grafana/alloy:v1.7.5

# Grafana settings
grafana_image: grafana/grafana:11.5.2
grafana_port: 3001
grafana_admin_password: admin

# Node Exporter settings (host system metrics)
node_exporter_image: prom/node-exporter:v1.9.1

# cAdvisor settings (container metrics)
cadvisor_image: gcr.io/cadvisor/cadvisor:v0.51.0

# Additional scrape targets to monitor remote hosts or services.
# Each entry requires: job_name, host (hostname or IP), port.
# Example:
#   monitoring_extra_targets:
#     - job_name: kubepi-node
#       host: kubepi
#       port: 9100
monitoring_extra_targets: []

# HTTP probe targets for service health monitoring.
# Alloy's built-in blackbox component will probe each URL every 30 seconds.
# Each entry requires: name (label), url (full HTTP/HTTPS URL).
# Example:
#   monitoring_probe_targets:
#     - name: paperless
#       url: http://ugreen-nas:8000
#     - name: gotify
#       url: http://ugreen-nas:8085
monitoring_probe_targets: []

# Timeout for HTTP health probes (e.g. "5s", "10s").
# Increase this for services that have slower startup or response times.
monitoring_probe_timeout: 5s

# Built-in dashboards shipped with this role.
monitoring_builtin_dashboards:
  - services-health.json
  - applications-overview.json

# Community dashboards to auto-download and provision in Grafana.
# Set enabled: false on any entry you do not want.
monitoring_community_dashboards:
  - name: node-exporter-full.json
    url: https://grafana.com/api/dashboards/1860/revisions/42/download
    enabled: true
  - name: cadvisor-exporter.json
    url: https://grafana.com/api/dashboards/14282/revisions/1/download
    enabled: true
