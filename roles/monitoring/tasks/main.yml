---
# Tasks to deploy the monitoring stack (Prometheus + Grafana Alloy +
# Grafana + Node Exporter + cAdvisor) via Docker Compose on the target host.

- name: Ensure monitoring group exists
  ansible.builtin.group:
    name: "{{ monitoring_group }}"
    gid: "{{ monitoring_gid }}"
    state: present

- name: Ensure monitoring user exists
  ansible.builtin.user:
    name: "{{ monitoring_user }}"
    uid: "{{ monitoring_uid }}"
    group: "{{ monitoring_group }}"
    createhome: false
    shell: /usr/sbin/nologin
    state: present

- name: Add monitoring user to docker group
  ansible.builtin.user:
    name: "{{ monitoring_user }}"
    groups: docker
    append: true

- name: Create monitoring base directory
  ansible.builtin.file:
    path: "{{ monitoring_base_dir }}"
    state: directory
    owner: "{{ monitoring_user }}"
    group: "{{ monitoring_group }}"
    mode: '0755'

- name: Create Grafana provisioning dashboards directory
  ansible.builtin.file:
    path: "{{ monitoring_base_dir }}/grafana/provisioning/dashboards"
    state: directory
    owner: "{{ monitoring_user }}"
    group: "{{ monitoring_group }}"
    mode: '0755'

- name: Create Grafana provisioning datasources directory
  ansible.builtin.file:
    path: "{{ monitoring_base_dir }}/grafana/provisioning/datasources"
    state: directory
    owner: "{{ monitoring_user }}"
    group: "{{ monitoring_group }}"
    mode: '0755'

- name: Create Grafana dashboards data directory
  ansible.builtin.file:
    path: "{{ monitoring_base_dir }}/grafana/dashboards"
    state: directory
    owner: "{{ monitoring_user }}"
    group: "{{ monitoring_group }}"
    mode: '0755'

- name: Create Alloy configuration directory
  ansible.builtin.file:
    path: "{{ monitoring_base_dir }}/alloy"
    state: directory
    owner: "{{ monitoring_user }}"
    group: "{{ monitoring_group }}"
    mode: '0755'

- name: Deploy Prometheus configuration
  ansible.builtin.template:
    src: prometheus.yml.j2
    dest: "{{ monitoring_base_dir }}/prometheus.yml"
    owner: "{{ monitoring_user }}"
    group: "{{ monitoring_group }}"
    mode: '0644'
  notify: Restart monitoring compose

- name: Deploy Grafana Alloy configuration
  ansible.builtin.template:
    src: alloy-config.alloy.j2
    dest: "{{ monitoring_base_dir }}/alloy/config.alloy"
    owner: "{{ monitoring_user }}"
    group: "{{ monitoring_group }}"
    mode: '0644'
  notify: Restart monitoring compose

- name: Deploy Grafana Prometheus datasource provisioning
  ansible.builtin.template:
    src: grafana-datasource.yml.j2
    dest: "{{ monitoring_base_dir }}/grafana/provisioning/datasources/prometheus.yml"
    owner: "{{ monitoring_user }}"
    group: "{{ monitoring_group }}"
    mode: '0644'
  notify: Restart monitoring compose

- name: Deploy Grafana dashboards provisioning
  ansible.builtin.template:
    src: grafana-dashboards.yml.j2
    dest: "{{ monitoring_base_dir }}/grafana/provisioning/dashboards/dashboards.yml"
    owner: "{{ monitoring_user }}"
    group: "{{ monitoring_group }}"
    mode: '0644'
  notify: Restart monitoring compose

- name: Define managed Grafana dashboard files
  ansible.builtin.set_fact:
    monitoring_managed_dashboards: >-
      {{
        (monitoring_builtin_dashboards | default([]))
        + (
          (monitoring_community_dashboards | default([])
          | selectattr('enabled', 'equalto', true)
          | map(attribute='name')
          | list)
        )
      }}

- name: Find existing Grafana dashboard JSON files
  ansible.builtin.find:
    paths: "{{ monitoring_base_dir }}/grafana/dashboards"
    patterns: "*.json"
    file_type: file
  register: grafana_dashboard_files

- name: Remove unmanaged Grafana dashboard JSON files
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: absent
  loop:
    "{{ grafana_dashboard_files.files }}"
  when: item.path | basename not in monitoring_managed_dashboards
  notify: Restart monitoring compose

- name: Deploy Grafana dashboard JSON files
  ansible.builtin.copy:
    src: "{{ item }}"
    dest: "{{ monitoring_base_dir }}/grafana/dashboards/{{ item | basename }}"
    owner: "{{ monitoring_user }}"
    group: "{{ monitoring_group }}"
    mode: '0644'
  loop: "{{ monitoring_builtin_dashboards | default([]) }}"
  notify: Restart monitoring compose

- name: Download community Grafana dashboard JSON files
  ansible.builtin.get_url:
    url: "{{ item.url }}"
    dest: "{{ monitoring_base_dir }}/grafana/dashboards/{{ item.name }}"
    owner: "{{ monitoring_user }}"
    group: "{{ monitoring_group }}"
    mode: '0644'
  loop: "{{ monitoring_community_dashboards | default([]) | selectattr('enabled', 'equalto', true) | list }}"
  notify: Restart monitoring compose

- name: Deploy docker-compose.yml
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ monitoring_base_dir }}/docker-compose.yml"
    owner: "{{ monitoring_user }}"
    group: "{{ monitoring_group }}"
    mode: '0644'
  notify: Restart monitoring compose

- name: Start monitoring stack
  ansible.builtin.shell: |
    if command -v docker >/dev/null 2>&1 && docker compose version >/dev/null 2>&1; then
      docker compose up -d
    elif command -v docker-compose >/dev/null 2>&1; then
      docker-compose up -d
    else
      echo "No docker compose found"
      exit 1
    fi
  args:
    chdir: "{{ monitoring_base_dir }}"
  register: compose_up
  changed_when: false
