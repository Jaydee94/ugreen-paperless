---
# Host-specific variables for ugreen-nas

# Connection settings
ansible_connection: ssh
ansible_become: true
ansible_become_method: sudo

# Paperless configuration
paperless_base_dir: /volume1/@home/jaydee/paperless

# Predefined Paperless admin user (change these for production)
paperless_admin_user: jaydee
paperless_admin_email: jaydee@mydomain.com
# Monitoring configuration
monitoring_extra_targets:
  - job_name: 'kubepi-node'
    host: 'kubepi'
    port: 9100

# HTTP probe targets for service health dashboard
monitoring_probe_targets:
  - name: paperless
    url: "http://ugreen-nas:8000"
  - name: gotify
    url: "http://ugreen-nas:8085"
  - name: prometheus
    url: "http://ugreen-nas:9090/-/healthy"
  - name: grafana
    url: "http://ugreen-nas:3001/api/health"
  - name: paperless-ai
    url: "http://kubepi:3000"
  - name: opencode
    url: "http://kubepi:8080"
