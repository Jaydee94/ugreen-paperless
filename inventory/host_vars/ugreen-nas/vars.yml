---
# Host-specific variables for ugreen-nas

# Connection settings
ansible_connection: ssh
ansible_become: true
ansible_become_method: sudo

# Paperless configuration
paperless_base_dir: /volume1/@home/jaydee/paperless

# Predefined Paperless admin user (change these for production)
paperless_admin_user: jaydee
paperless_admin_email: jaydee@mydomain.com
# Monitoring configuration
# Stable hostname for monitoring probes to kubepi services.
# Keep separate from inventory ansible_host so SSH resolution can differ.
kubepi_probe_host: kubepi
monitoring_probe_timeout: 12s

monitoring_extra_targets:
  - job_name: 'kubepi-node'
    host: 'kubepi'
    port: 9100
  - job_name: 'cadvisor'
    host: 'kubepi'
    port: 18080

# HTTP probe targets for service health dashboard
monitoring_probe_targets:
  - name: paperless
    url: "http://{{ hostvars['ugreen-nas'].ansible_host }}:8000"
  - name: gotify
    url: "http://{{ hostvars['ugreen-nas'].ansible_host }}:8085"
  - name: prometheus
    url: "http://{{ hostvars['ugreen-nas'].ansible_host }}:9090/-/healthy"
  - name: grafana
    url: "http://{{ hostvars['ugreen-nas'].ansible_host }}:3001/api/health"
  - name: paperless-ai
    url: "http://{{ kubepi_probe_host }}:3000/health"
  - name: opencode
    url: "http://{{ kubepi_probe_host }}:8080"
  - name: openclaw
    url: "http://{{ hostvars['ugreen-nas'].ansible_host }}:3000"
